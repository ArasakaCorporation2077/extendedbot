# Extended Exchange Market Maker - Testnet Config

[exchange]
testnet = true
paper_trading = false
user_agent = "extended-mm/0.1.0-testnet"

[trading]
market = "BTC-USD"
order_size_usd = 50.0
min_order_usd = 5.0
max_order_usd = 1000.0
leverage = 5

# Expiry: testnet supports up to 28 days
expiry_days = 7
dead_man_switch_timeout_ms = 60000

# Wider spreads for testnet safety
base_spread_bps = 6.0
min_spread_bps = 2.0
max_spread_bps = 30.0

# VPIN less sensitive
vpin_bucket_volume = 0.5
vpin_num_buckets = 10

# Single level for testnet
num_levels = 1

[risk]
max_position_usd = 2000.0
max_daily_loss_usd = 200.0
max_orders_per_minute = 100
max_errors_per_minute = 20
stale_price_s = 10.0
cooldown_s = 30
