# Extended Exchange Market Maker - Mainnet Config

[exchange]
paper_trading = false
user_agent = "extended-mm/0.1.0"
# API key and secret from env: EXTENDED_API_KEY, EXTENDED_API_SECRET

[trading]
market = "TAO-USD"
order_size_usd = 40.0
min_order_usd = 35.0
max_order_usd = 50.0
leverage = 5

# Expiry: mainnet supports up to 90 days
expiry_days = 7
dead_man_switch_timeout_ms = 60000

# Fair price
ewma_alpha = 0.01
update_threshold_bps = 3.0
min_requote_interval_ms = 100

# Spread
base_spread_bps = 4.0
min_spread_bps = 2.0
max_spread_bps = 20.0
volatility_sensitivity = 0.5
latency_vol_multiplier = 2.0
markout_sensitivity = 0.5

# Skew
price_skew_enabled = true
price_skew_bps = 7.0
size_skew_enabled = true
size_skew_factor = 1.0
min_size_multiplier = 0.2
max_size_multiplier = 1.8
emergency_flatten_ratio = 0.8

# VPIN
# VPIN now fed by Binance aggTrade — larger buckets for higher volume
vpin_bucket_volume = 50.0
vpin_num_buckets = 50

# Multi-level quoting
num_levels = 2
level_spacing_bps = 3.0
level_size_decay = 0.7

# Fast cancel
fast_cancel_threshold_bps = 3.0
max_order_age_s = 5.0

# Best price tighten
best_price_tighten_enabled = true
best_price_margin_bps = 1.0

# Close mode
close_threshold_ratio = 0.25
close_spread_bps = 4.0

# Trade flow / depth imbalance (regression-optimized from 1,427 fills)
trade_flow_sensitivity_bps = 0.5
depth_imbalance_sensitivity_bps = 0.3

# ROC guard — pause quoting when price moves too fast
roc_window_ms = 10000         # 10s rolling window
roc_threshold_bps = 30.0      # 30bps move triggers pause
roc_pause_ms = 15000          # 15s pause after trigger

# Inventory thresholds
one_side_inventory_ratio = 0.45
hard_one_side_inventory_ratio = 0.70

[risk]
max_position_usd = 50.0
max_daily_loss_usd = 500.0
max_orders_per_minute = 300
max_errors_per_minute = 10
stale_price_s = 5.0
cooldown_s = 60
