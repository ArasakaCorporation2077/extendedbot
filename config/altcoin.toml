# Extended Exchange Market Maker - Altcoin Config
# For low-liquidity markets ($200K-$2M daily volume)
# Fills expected every 10-30 minutes, spreads 6-15bps
#
# Usage: EXTENDED_CONFIG=config/altcoin.toml cargo run -p extended-bot

[exchange]
paper_trading = false
user_agent = "extended-mm/0.1.0"
# API key and secret from env: EXTENDED_API_KEY, EXTENDED_API_SECRET

[trading]
market = "MON-USD"            # Override per market
order_size_usd = 30.0
min_order_usd = 25.0
max_order_usd = 40.0
leverage = 5

expiry_days = 7
dead_man_switch_timeout_ms = 60000

# Fair price — slower reaction for sparse orderbooks
ewma_alpha = 0.01             # Same as ETH — fast basis tracking
update_threshold_bps = 3.0    # React to 3bps moves — stale quotes = adverse selection
min_requote_interval_ms = 200  # 200ms debounce — fast enough to avoid staleness

# Spread — narrower base + wider dynamic range so markout feedback can flex
base_spread_bps = 12.0        # was 16. Tighter start so feedback has room to widen.
min_spread_bps = 8.0          # was 12. Floor below which we never quote.
max_spread_bps = 60.0         # was 30. Cap when dynamic factors push wide.
volatility_sensitivity = 0.3
latency_vol_multiplier = 2.0
markout_sensitivity = 0.6     # was 0.3. 60% of toxicity feedback hits spread.
markout_feedback_cap_multiplier = 6.0  # was hardcoded 3x. Now: base*6 = 72bps max.

# Skew — tanh response so small positions barely skew, large saturate gradually
price_skew_enabled = true
price_skew_bps = 15.0         # Very strong skew — pull adverse side hard in trends
price_skew_tanh = true        # smooth tanh curve vs prior ratio*|ratio|
size_skew_enabled = true
size_skew_factor = 0.8
min_size_multiplier = 0.3
max_size_multiplier = 1.5
emergency_flatten_ratio = 0.8

# VPIN — re-enabled with buckets sized for altcoin volume
# MON Binance ~$500K daily / $0.025 = ~20M MON daily
# 10K per bucket → ~2000 buckets/day → each bucket ≈ 43s of trading
# 50-bucket window ≈ 36 minutes of sustained flow data
vpin_enabled = true
vpin_bucket_volume = 10000.0
vpin_num_buckets = 50

# Multi-level — single level to concentrate liquidity
num_levels = 1
level_spacing_bps = 5.0
level_size_decay = 0.7

# Fast cancel — much less aggressive
fast_cancel_threshold_bps = 4.0  # Cancel on 4bps adverse (must be > update_threshold to avoid cancel-without-replace)
max_order_age_s = 30.0           # 30s max — stale orders have worst markout

# Best price tighten — wider margin in thin books
best_price_tighten_enabled = false  # disabled — code floor is the real fix
best_price_margin_bps = 2.0         # keep existing

# Close mode
close_threshold_ratio = 0.25
close_spread_bps = 6.0

# Trade flow / depth imbalance — lower sensitivity (less signal in thin markets)
trade_flow_sensitivity_bps = 0.3
depth_imbalance_sensitivity_bps = 0.2

# Inventory — same thresholds but wider position allowed
one_side_inventory_ratio = 0.45
hard_one_side_inventory_ratio = 0.70

# Aggressive/reducing — sparse fills, but exponential decay actually pressures exit
aggressive_edge_bps = 5.0       # only enter when 5bps+ edge vs Binance (cap×6 = 30bps max)
reducing_max_spread_bps = 16.0  # opening spread for reducing side
reducing_min_spread_bps = 6.0   # was 14. Floor when timer matures.
reducing_decay_s = 30.0         # was 300. Now τ for exp decay: 60% closer to min by 30s, 95% by 90s
flow_gate_threshold = 0.6       # was hardcoded. Increase if MON noise triggers false gates.

# Asymmetric basis filter — BUY side leaks at +basis, SELL side fine
basis_filter_buy_premium_bps  = 5.0    # block bid when basis > +5  (was ±10 symmetric)
basis_filter_sell_discount_bps = 10.0  # block ask when basis < -10 (unchanged)

# Asymmetric drift cancel — BUYs go stale faster on rising basis
basis_drift_buy_bps  = 5.0   # cancel resting BUY on +5bps drift (was 8 symmetric)
basis_drift_sell_bps = 8.0   # cancel resting SELL on -8bps drift (unchanged)

# 2-second taker exit — markout peaks at ~2s, then decays into negative
taker_exit_enabled   = true
taker_exit_timeout_s = 2.0
taker_exit_slippage_cap_bps = 10.0  # IOC limit at BBO ± 10bps
taker_exit_min_position_usd = 5.0   # ignore dust under $5

# ROC guard — wider threshold for volatile alts
roc_window_ms = 10000
roc_threshold_bps = 20.0        # 20bps — pause quoting on strong trends early
roc_pause_ms = 20000

[risk]
max_position_usd = 50.0         # Smaller max position
max_daily_loss_usd = 100.0      # Tighter loss limit ($53 balance)
max_orders_per_minute = 100     # Fewer orders needed
max_errors_per_minute = 10
stale_price_s = 10.0            # Wider stale window (thin book updates less)
cooldown_s = 120                # Longer cooldown after circuit break
